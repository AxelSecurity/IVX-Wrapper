<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="iconGradL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="textGradL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <radialGradient id="coreGradL" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </radialGradient>
  </defs>

  <!-- ============ ICON ============ -->
  <g>
    <!-- Left bracket  < -->
    <path d="M 95 55 L 55 110 L 95 165"
          fill="none" stroke="url(#iconGradL)" stroke-width="11"
          stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Right bracket  > -->
    <path d="M 175 55 L 215 110 L 175 165"
          fill="none" stroke="url(#iconGradL)" stroke-width="11"
          stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Connection lines from core to satellites -->
    <line x1="135" y1="110" x2="105" y2="78"  stroke="#a5b4fc" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="135" y1="110" x2="165" y2="78"  stroke="#a5b4fc" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="135" y1="110" x2="135" y2="148" stroke="#a5b4fc" stroke-width="1.8" stroke-linecap="round"/>

    <!-- Satellites (3 sources) -->
    <circle cx="105" cy="78"  r="5" fill="#0ea5e9"/>
    <circle cx="165" cy="78"  r="5" fill="#f97316"/>
    <circle cx="135" cy="148" r="5" fill="#10b981"/>

    <!-- Core node -->
    <circle cx="135" cy="110" r="13" fill="url(#coreGradL)"/>
    <circle cx="135" cy="110" r="13" fill="none" stroke="#ffffff" stroke-width="2"/>
  </g>

  <!-- Divider -->
  <line x1="260" y1="60" x2="260" y2="160" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- ============ WORDMARK ============ -->
  <text x="295" y="130" font-size="86" font-weight="800" fill="url(#textGradL)" letter-spacing="-2">IVX</text>

  <!-- Tagline -->
  <text x="298" y="165" font-size="16" font-weight="600" fill="#475569" letter-spacing="6">INTELLIGENCE WRAPPER</text>

  <!-- Small accent dot under tagline -->
  <circle cx="293" cy="160" r="2.5" fill="#7c3aed"/>
</svg>
